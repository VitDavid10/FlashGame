<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pill Wars · Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
    /* ===== Identidad PillWars: paleta de la web + cajas del menú del juego ===== */
    :root {
        --primary: #00ff88;
        --primary-dim: rgba(0, 255, 136, 0.1);
        --accent: #ff2a2a;
        --bg-dark: #050505;
        --box: rgba(10, 15, 10, 0.95);
        --border: #333;
        --muted: #888;
        --yellow: #ffce3d; --orange: #ff8c42; --purple: #b07cf7;
        --navbar-height: 64px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
        background-color: var(--bg-dark);
        background-image: linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        color: #e0e0e0; font-family: 'Inter', sans-serif; font-size: 13.5px;
        min-height: 100vh;
    }
    .russo { font-family: 'Russo One', sans-serif; font-weight: 400; }

    /* ===== Logo píldora (como la web: girada, blanco/verde, glow) ===== */
    .pill-logo { width: 22px; height: 40px; border-radius: 11px; background: linear-gradient(180deg, #ffffff 50%, var(--primary) 50%); transform: rotate(-30deg); box-shadow: 0 0 18px var(--primary); border: 2px solid #000; flex: none; }
    .pill-logo.grande { width: 32px; height: 58px; border-radius: 16px; box-shadow: 0 0 28px var(--primary); }

    /* ===== Login (caja del menú del juego) ===== */
    #loginOverlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; background-color: var(--bg-dark); background-image: inherit; background-size: inherit; }
    .login-card { width: 380px; text-align: center; padding: 44px 42px 36px 42px; background: var(--box); border: 1px solid var(--primary); border-radius: 12px; box-shadow: 0 0 50px rgba(0, 255, 136, 0.15); }
    .login-card .pill-logo { margin: 0 auto 22px auto; }
    .login-title { font-size: 30px; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
    .login-title b { color: var(--primary); font-weight: 400; text-shadow: 0 0 18px rgba(0,255,136,0.6); }
    .login-sub { color: var(--muted); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin: 8px 0 28px 0; font-family: 'Russo One'; }
    .login-card input { width: 100%; padding: 13px; background: #0a0a0a; border: 1px solid var(--border); color: #fff; border-radius: 8px; font-size: 17px; text-align: center; letter-spacing: 8px; outline: none; transition: 0.3s; }
    .login-card input:focus { border-color: var(--primary); box-shadow: 0 0 12px var(--primary-dim); }
    .login-card button { width: 100%; margin-top: 16px; padding: 13px; background: transparent; border: 1px solid var(--primary); color: var(--primary); border-radius: 8px; font-size: 14px; font-family: 'Russo One'; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: 0.3s; box-shadow: 0 0 5px var(--primary-dim); }
    .login-card button:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }
    #loginError { color: var(--accent); font-size: 12px; height: 16px; margin-top: 12px; font-weight: 700; }
    .shake { animation: shake .4s; }
    @keyframes shake { 20%,60% { transform: translateX(-7px); } 40%,80% { transform: translateX(7px); } }

    /* ===== Navbar (como la web) ===== */
    #app { display: none; }
    header { display: flex; align-items: center; gap: 18px; height: var(--navbar-height); padding: 0 30px; background: rgba(0, 0, 0, 0.95); border-bottom: 1px solid var(--primary); position: sticky; top: 0; z-index: 20; }
    header .htitle { font-size: 22px; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
    header .htitle b { color: var(--primary); font-weight: 400; }
    header .htag { font-family: 'Russo One'; font-size: 10px; color: #000; background: var(--primary); padding: 3px 10px; border-radius: 4px; letter-spacing: 2px; box-shadow: 0 0 12px var(--primary-dim); }
    header .hmeta { margin-left: auto; display: flex; align-items: center; gap: 20px; color: var(--muted); font-size: 12px; }
    .live { display: inline-flex; align-items: center; gap: 7px; font-family: 'Russo One'; font-size: 11px; letter-spacing: 1px; color: var(--primary); text-transform: uppercase; }
    .live .d { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); animation: pulse 1.6s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,255,136,.5);} 70% { box-shadow: 0 0 0 7px rgba(0,255,136,0);} 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0);} }
    .lock-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 6px; padding: 7px 16px; font-size: 11px; font-family: 'Russo One'; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
    .lock-btn:hover { background: var(--accent); color: #fff; box-shadow: 0 0 18px rgba(255,42,42,0.5); }

    main { padding: 26px 30px 70px 30px; max-width: 1420px; margin: 0 auto; }

    /* tabs: como los nav-links de la web */
    nav.tabs { display: flex; gap: 30px; margin-bottom: 24px; border-bottom: 1px solid #222; }
    nav.tabs button { background: transparent; border: 0; color: #666; font-family: 'Russo One'; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; padding: 12px 2px; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.25s; }
    nav.tabs button:hover { color: #fff; text-shadow: 0 0 10px #fff; }
    nav.tabs button.act { color: var(--primary); border-bottom-color: var(--primary); text-shadow: 0 0 12px rgba(0,255,136,0.5); }

    /* resumen */
    .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(165px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .sumcard { background: var(--box); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; display: flex; gap: 14px; align-items: center; transition: 0.25s; }
    .sumcard:hover { border-color: var(--primary); box-shadow: 0 0 20px var(--primary-dim); transform: translateY(-2px); }
    .sumcard svg { width: 26px; height: 26px; flex: none; }
    .sumcard .v { font-size: 21px; color: var(--primary); text-shadow: 0 0 10px rgba(0,255,136,0.35); line-height: 1.1; }
    .sumcard .k { color: var(--muted); font-size: 10.5px; margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; font-family: 'Russo One'; }

    h2.section { font-family: 'Russo One'; font-size: 13px; letter-spacing: 3px; color: var(--primary); text-transform: uppercase; margin: 30px 0 14px 0; display: flex; align-items: center; gap: 14px; text-shadow: 0 0 12px rgba(0,255,136,0.4); }
    h2.section::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--primary-dim), transparent); }

    /* Sub-pestañas CLASSIC | ARCADE dentro de Salas */
    .modetabs { display: flex; align-items: center; gap: 26px; margin: 30px 0 14px 0; }
    .modetabs::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--primary-dim), transparent); }
    .modetab { background: transparent; border: 0; cursor: pointer; font-family: 'Russo One'; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: #555; padding: 0 0 6px 0; border-bottom: 2px solid transparent; transition: 0.25s; }
    .modetab:hover { color: #fff; text-shadow: 0 0 10px #fff; }
    .modetab.act { color: var(--primary); border-bottom-color: var(--primary); text-shadow: 0 0 12px rgba(0,255,136,0.4); }
    .modetab .cnt { color: var(--primary); }
    .modetab .cnt.cero { color: rgba(0,255,136,0.3); text-shadow: none; }

    /* Ranking de países */
    .ccode { display: inline-flex; min-width: 34px; height: 20px; padding: 0 6px; align-items: center; justify-content: center; border-radius: 5px; background: #1a1a1a; border: 1px solid #2c2c2c; font-family: 'Russo One'; font-size: 10px; letter-spacing: 1px; color: var(--primary); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 16px; }

    /* sala: caja del menú con acento de estado */
    .room { background: var(--box); border: 1px solid var(--border); border-left: 3px solid #444; border-radius: 12px; overflow: hidden; transition: 0.25s; }
    .room:hover { border-color: var(--primary); border-left-width: 3px; box-shadow: 0 0 30px var(--primary-dim); transform: translateY(-2px); }
    .room.s-playing { border-left-color: var(--primary); }
    .room.s-waiting { border-left-color: var(--yellow); }
    .room.s-ended  { border-left-color: var(--orange); }
    .room-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 10px 18px; }
    .room-name { font-size: 19px; color: #fff; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: baseline; gap: 10px; }
    .room-name .meta { color: #666; font-size: 10px; font-family: 'Russo One'; letter-spacing: 1px; }
    .state { display: inline-flex; align-items: center; gap: 7px; font-family: 'Russo One'; font-size: 10px; letter-spacing: 1.5px; padding: 4px 12px; border-radius: 20px; }
    .state .d { width: 7px; height: 7px; border-radius: 50%; }
    .st-playing { background: var(--primary-dim); color: var(--primary); border: 1px solid rgba(0,255,136,0.3); } .st-playing .d { background: var(--primary); animation: pulse 1.6s infinite; }
    .st-waiting { background: rgba(255,206,61,.08); color: var(--yellow); border: 1px solid rgba(255,206,61,0.25); } .st-waiting .d { background: var(--yellow); }
    .st-ended { background: rgba(255,140,66,.08); color: var(--orange); border: 1px solid rgba(255,140,66,0.25); } .st-ended .d { background: var(--orange); }
    .st-offline { background: rgba(136,136,136,.07); color: #777; border: 1px solid #2a2a2a; } .st-offline .d { background: #666; }
    .room-body { padding: 0 18px 16px 18px; }
    .statline { display: flex; flex-wrap: wrap; gap: 7px 18px; align-items: center; color: var(--muted); font-size: 12px; margin-bottom: 10px; }
    .statline .it { display: inline-flex; align-items: center; gap: 6px; }
    .statline svg { width: 14px; height: 14px; opacity: .8; }
    .players-chip { display: inline-flex; align-items: center; gap: 8px; background: #111; border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; cursor: pointer; color: #ccc; font-size: 11px; font-family: 'Russo One'; letter-spacing: 0.5px; user-select: none; transition: 0.25s; }
    .players-chip:hover { border-color: var(--primary); color: #fff; box-shadow: 0 0 12px var(--primary-dim); }
    .pdot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
    .pdot.on { background: var(--primary); animation: pulse 1.6s infinite; }
    .timerline { color: var(--primary); font-size: 12px; font-family: 'Russo One'; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; text-shadow: 0 0 8px rgba(0,255,136,0.35); }
    .timerline svg { width: 14px; height: 14px; }
    .timerline.naranja { color: var(--orange); text-shadow: 0 0 8px rgba(255,140,66,0.35); }
    .timerline.amarillo { color: var(--yellow); text-shadow: 0 0 8px rgba(255,206,61,0.3); }

    .players-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #222; }
    table.players { width: 100%; border-collapse: collapse; margin: 0; background: #0a0a0a; margin-bottom: 12px; }
    table.players th, table.players td { text-align: left; padding: 7px 10px; font-size: 11.5px; white-space: nowrap; }
    table.players th:last-child, table.players td:last-child { min-width: 210px; position: sticky; right: 0; background: #0a0a0a; box-shadow: -10px 0 10px rgba(0,0,0,.55); }
    table.players thead th:last-child { background: #111; }
    table.players thead tr { border-bottom: 1px solid var(--border); background: #111; }
    table.players tbody tr:not(:last-child) { border-bottom: 1px solid #1a1a1a; }
    table.players th { color: #666; font-family: 'Russo One'; font-weight: 400; text-transform: uppercase; font-size: 9.5px; letter-spacing: 1px; }
    .tag { font-size: 9px; padding: 2.5px 8px; border-radius: 10px; font-family: 'Russo One'; letter-spacing: 0.5px; }
    .tag.vivo { background: var(--primary-dim); color: var(--primary); }
    .tag.muerto { background: rgba(255,42,42,.12); color: var(--accent); }
    .tag.god { background: rgba(176,124,247,.14); color: var(--purple); }

    .rules { display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px; margin: 4px 0 9px 0; }
    .rules label { font-size: 9px; color: #666; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; font-family: 'Russo One'; }
    .rules input[type=number] { width: 100%; padding: 7px 9px; background: #0a0a0a; border: 1px solid var(--border); color: #fff; border-radius: 6px; font-size: 12.5px; outline: none; transition: 0.25s; }
    .rules input[type=number]:focus { border-color: var(--primary); box-shadow: 0 0 8px var(--primary-dim); }
    .ruleline { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; flex-wrap: wrap; }
    .chk { display: flex; align-items: center; gap: 7px; font-size: 12px; cursor: pointer; color: #ccc; }
    .chk input { accent-color: var(--primary); }
    .hint { color: #666; font-size: 10.5px; }

    /* botones: btn-connect (verde) / btn-play (rojo) de la web */
    .btns { display: flex; flex-wrap: wrap; gap: 7px; }
    button.b { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 6px; font-size: 11px; font-family: 'Russo One'; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: 0.25s; background: #1a1a1a; border: 1px solid var(--border); color: #aaa; }
    button.b svg { width: 13px; height: 13px; }
    button.b:hover { color: #fff; border-color: #555; transform: translateY(-1px); }
    button.b:disabled { opacity: .3; cursor: default; transform: none; }
    .b.verde { background: transparent; border: 1px solid var(--primary); color: var(--primary); box-shadow: 0 0 5px var(--primary-dim); }
    .b.verde:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }
    .b.rojo { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    .b.rojo:hover { background: var(--accent); color: #fff; box-shadow: 0 0 18px rgba(255,42,42,0.5); }
    .b.naranja { background: transparent; border: 1px solid var(--orange); color: var(--orange); }
    .b.naranja:hover { background: var(--orange); color: #000; box-shadow: 0 0 16px rgba(255,140,66,0.4); }
    .b.morado { background: transparent; border: 1px solid var(--purple); color: var(--purple); }
    .b.morado:hover { background: var(--purple); color: #000; box-shadow: 0 0 16px rgba(176,124,247,0.4); }
    .b.azul { background: transparent; border: 1px solid #4f9cff; color: #4f9cff; }
    .b.azul:hover { background: #4f9cff; color: #000; box-shadow: 0 0 16px rgba(79,156,255,0.4); }
    .b.mini { padding: 4px 10px; font-size: 10px; }

    /* ranking */
    table.rank { width: 100%; border-collapse: collapse; background: var(--box); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    table.rank th, table.rank td { text-align: left; padding: 11px 16px; font-size: 12.5px; }
    table.rank thead tr { background: #111; border-bottom: 1px solid var(--border); }
    table.rank th { color: #666; font-family: 'Russo One'; font-weight: 400; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; }
    table.rank tbody tr { border-top: 1px solid #1a1a1a; transition: 0.2s; }
    table.rank tbody tr:hover { background: var(--primary-dim); }
    table.rank td.kills { color: var(--primary); font-family: 'Russo One'; }
    .pos { display: inline-flex; width: 26px; height: 26px; border-radius: 50%; align-items: center; justify-content: center; font-size: 12px; background: #1a1a1a; border: 1px solid #333; color: #888; }
    .pos.p1 { background: linear-gradient(180deg,#ffd54a,#b8860b); border: 0; color: #2b2000; box-shadow: 0 0 12px rgba(255,213,74,0.4); }
    .pos.p2 { background: linear-gradient(180deg,#e0e6ee,#8a95a5); border: 0; color: #1c222c; }
    .pos.p3 { background: linear-gradient(180deg,#e29c66,#8c5523); border: 0; color: #2b1a07; }

    /* actividad */
    .usage { background: var(--box); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
    .urow { display: grid; grid-template-columns: 140px 1fr 160px; gap: 14px; align-items: center; padding: 7px 0; }
    .urow .nm { font-size: 13px; color: #fff; text-transform: uppercase; }
    .urow .nm span { color: #666; font-family: 'Inter'; font-size: 9.5px; letter-spacing: 1px; }
    .ubar { height: 12px; background: #0a0a0a; border: 1px solid #222; border-radius: 7px; overflow: hidden; }
    .ubar i { display: block; height: 100%; background: linear-gradient(90deg, rgba(0,255,136,0.45), var(--primary)); box-shadow: 0 0 10px var(--primary-dim); border-radius: 7px; transition: width .6s ease; }
    .urow .val { color: var(--muted); font-size: 11.5px; text-align: right; }
    table.hist { width: 100%; border-collapse: collapse; margin-top: 6px; }
    table.hist td { padding: 6px 10px; font-size: 12px; color: var(--muted); border-top: 1px solid #1a1a1a; }
    .vacio { color: #666; padding: 26px; text-align: center; font-size: 12.5px; }
</style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card" id="loginCard">
        <div class="pill-logo grande"></div>
        <div class="login-title russo">PILL <b>WARS</b></div>
        <div class="login-sub">Panel de control</div>
        <input id="key" type="password" placeholder="····" maxlength="32" autocomplete="off" onkeydown="if(event.key==='Enter')conectar()">
        <button onclick="conectar()">Desbloquear</button>
        <div id="loginError"></div>
    </div>
</div>

<div id="app">
    <header>
        <div class="pill-logo"></div>
        <div class="htitle russo">PILL <b>WARS</b></div>
        <span class="htag">CONTROL</span>
        <div class="hmeta">
            <span class="live"><span class="d"></span><span id="liveTxt">en vivo</span></span>
            <span id="metaInfo"></span>
            <button class="lock-btn" onclick="bloquear()">Bloquear</button>
        </div>
    </header>
    <main>
        <div class="summary" id="summary"></div>
        <nav class="tabs">
            <button id="tabBtn_salas" class="act" onclick="verTab('salas')">Salas</button>
            <button id="tabBtn_jugadores" onclick="verTab('jugadores')">Jugadores</button>
            <button id="tabBtn_actividad" onclick="verTab('actividad')">Actividad</button>
        </nav>

        <div id="tab_salas">
            <div class="modetabs">
                <button id="modeBtn_classic" class="modetab act" onclick="verModo('classic')">Classic <span id="cntClassic" class="cnt cero">(0)</span></button>
                <button id="modeBtn_arcade" class="modetab" onclick="verModo('arcade')">Arcade <span id="cntArcade" class="cnt cero">(0)</span></button>
            </div>
            <div class="grid" id="gridClassic"></div>
            <div class="grid" id="gridArcade" style="display:none"></div>
            <div id="gridOtras"></div>
        </div>

        <div id="tab_jugadores" style="display:none">
            <h2 class="section">Ranking de jugadores</h2>
            <table class="rank">
                <thead><tr><th></th><th>Jugador</th><th>Kills</th><th>Muertes</th><th>K / D</th><th>Partidas</th><th>Última vez</th><th>IP</th></tr></thead>
                <tbody id="rankCuerpo"></tbody>
            </table>
        </div>

        <div id="tab_actividad" style="display:none">
            <h2 class="section">Países</h2>
            <table class="rank">
                <thead><tr><th></th><th>País</th><th></th><th>Entradas</th><th>"Dinero"</th></tr></thead>
                <tbody id="paisesCuerpo"></tbody>
            </table>
            <h2 class="section">Salas más usadas</h2>
            <div class="usage" id="usoSalas"></div>
            <h2 class="section">Últimas conexiones</h2>
            <div class="usage" style="padding-top:8px">
                <table class="hist"><tbody id="histCuerpo"></tbody></table>
            </div>
        </div>
    </main>
</div>

<script>
// Iconos SVG en la paleta del juego
const IC = {
    users: '<svg viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-6 6.5-6s6.5 2.4 6.5 6"/><circle cx="17.5" cy="9.5" r="2.5"/><path d="M16 14.4c2.9.3 5.5 2.3 5.5 5.6"/></svg>',
    room: '<svg viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 9h18M8 21h8"/></svg>',
    skull: '<svg viewBox="0 0 24 24" fill="none" stroke="#ff2a2a" stroke-width="2"><path d="M12 2a8 8 0 0 0-8 8c0 3 1.6 5.4 4 6.7V20a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-3.3c2.4-1.3 4-3.8 4-6.7a8 8 0 0 0-8-8z"/><circle cx="9" cy="10" r="1.4" fill="#ff2a2a"/><circle cx="15" cy="10" r="1.4" fill="#ff2a2a"/></svg>',
    coin: '<svg viewBox="0 0 24 24" fill="none" stroke="#ffce3d" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5c0-1 1.1-1.8 2.5-1.8s2.5.8 2.5 1.8-1 1.6-2.5 2-2.5 1-2.5 2 1.1 1.8 2.5 1.8 2.5-.8 2.5-1.8"/></svg>',
    door: '<svg viewBox="0 0 24 24" fill="none" stroke="#b07cf7" stroke-width="2"><path d="M14 3h5a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1h-5M10 17l-5-5 5-5M5 12h11"/></svg>',
    bot: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="8" width="14" height="11" rx="2"/><path d="M12 8V4M8 4h8"/><circle cx="9.5" cy="13" r="1" fill="currentColor"/><circle cx="14.5" cy="13" r="1" fill="currentColor"/></svg>',
    clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>',
    play: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 4.5v15l13-7.5z"/></svg>',
    refresh: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 11a8 8 0 1 0-2 6.3"/><path d="M20 4v7h-7" fill="none"/></svg>',
    broom: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 4l5 5M9 10l-6 10 10-6M9 10l5-6 6 5-6 5z"/></svg>',
    power: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 3v9"/><path d="M6.3 6.5a8 8 0 1 0 11.4 0"/></svg>',
    in: '<svg viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><path d="M10 3H5a1 1 0 0 0-1 1v16a1 1 0 0 0 1 1h5M14 7l5 5-5 5M19 12H8"/></svg>'
};

let ws = null, key = '', autorizado = false, tabActiva = 'salas';
const expandidos = new Set();

function conectar() {
    key = document.getElementById('key').value;
    if (!key) { errorLogin('Escribe la clave'); return; }
    if (ws) { try { ws.close(); } catch(e){} }
    ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host);
    ws.onopen = () => pedir();
    ws.onmessage = e => {
        let m; try { m = JSON.parse(e.data); } catch(err) { return; }
        if (m.t === 'adminState') {
            if (!autorizado) { autorizado = true; document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('app').style.display = 'block'; }
            render(m);
        } else if (m.t === 'adminError') {
            errorLogin('Clave incorrecta');
        }
    };
    ws.onclose = () => {
        document.getElementById('liveTxt').innerText = 'sin conexión';
        if (!autorizado) errorLogin('Sin conexión con el servidor');
        else setTimeout(conectar, 3000);
    };
}
function errorLogin(txt) { document.getElementById('loginError').innerText = txt; const c = document.getElementById('loginCard'); c.classList.remove('shake'); void c.offsetWidth; c.classList.add('shake'); }
function bloquear() { autorizado = false; key = ''; if (ws) { try { ws.onclose = null; ws.onmessage = null; ws.close(); } catch(e){} ws = null; } document.getElementById('app').style.display = 'none'; document.getElementById('loginOverlay').style.display = 'flex'; document.getElementById('key').value = ''; document.getElementById('loginError').innerText = ''; }
function send(o) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(Object.assign({ t: 'admin', key }, o))); }
function pedir() { send({ cmd: 'state' }); }
setInterval(() => { if (autorizado) pedir(); }, 2000);

function verTab(t) {
    tabActiva = t;
    for (const x of ['salas', 'jugadores', 'actividad']) {
        document.getElementById('tab_' + x).style.display = (x === t) ? 'block' : 'none';
        document.getElementById('tabBtn_' + x).classList.toggle('act', x === t);
    }
}

let modoActivo = 'classic';
function verModo(m) {
    modoActivo = m;
    document.getElementById('gridClassic').style.display = (m === 'classic') ? '' : 'none';
    document.getElementById('gridArcade').style.display = (m === 'arcade') ? '' : 'none';
    document.getElementById('modeBtn_classic').classList.toggle('act', m === 'classic');
    document.getElementById('modeBtn_arcade').classList.toggle('act', m === 'arcade');
}

function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtSeg(s) { if (s < 60) return s + 's'; if (s < 3600) return Math.floor(s/60) + 'm'; return Math.floor(s/3600) + 'h' + Math.floor((s%3600)/60) + 'm'; }
function fmtMs(ms) { const s = Math.ceil(ms / 1000); const m = Math.floor(s / 60); return (m < 10 ? '0' + m : m) + ':' + ((s % 60) < 10 ? '0' + (s % 60) : (s % 60)); }
function num(n) { return Number(n || 0).toLocaleString('en-US'); }
function dinero(n) { return num(n) + ' $'; }
function ponCnt(id, n) { const el = document.getElementById(id); el.innerText = `(${n})`; el.classList.toggle('cero', n === 0); }
function fecha(iso) { return iso ? String(iso).replace('T', ' ').slice(0, 16) : '—'; }

// acciones
function kick(id) { if (confirm('¿Expulsar a este jugador?')) { send({ cmd: 'kick', playerId: id }); setTimeout(pedir, 300); } }
function god(id) { send({ cmd: 'power', playerId: id, name: 'god', args: [] }); setTimeout(pedir, 300); }
function masa(id) { const n = prompt('Nueva masa:', '50000'); if (n) { send({ cmd: 'power', playerId: id, name: 'mass', args: [n] }); setTimeout(pedir, 300); } }
function forzar(room) { send({ cmd: 'forceStart', room }); setTimeout(pedir, 300); }
function reiniciar(room) { if (confirm('¿Reiniciar la sala? Los que estén jugando verán "SALA REINICIADA" y podrán darle a TRY AGAIN.')) { send({ cmd: 'restart', room }); setTimeout(pedir, 300); } }
function vaciar(room) { if (confirm('¿Echar a TODOS los jugadores de la sala?')) { send({ cmd: 'kickAll', room }); setTimeout(pedir, 300); } }
function apagar(room) { if (confirm('¿APAGAR la sala? Echa a todos y la destruye.')) { send({ cmd: 'shutdown', room }); setTimeout(pedir, 300); } }
function espectar(mode, room) { window.open(location.origin + '/game/?spectate=' + encodeURIComponent(room) + '&mode=' + encodeURIComponent(mode), '_blank'); }
function togglePlayers(roomKey) { if (expandidos.has(roomKey)) expandidos.delete(roomKey); else expandidos.add(roomKey); pedir(); }
function aplicarReglas(roomKey) {
    const g = id => document.getElementById(id + '_' + roomKey);
    send({ cmd: 'rules', room: roomKey, rules: {
        speed: parseFloat(g('r_speed').value), food: parseFloat(g('r_food').value),
        virus: parseFloat(g('r_virus').value), botsEnabled: g('r_botson').checked,
        botCount: parseInt(g('r_botn').value),
        minReal: parseInt(g('r_minreal').value), targetPop: parseInt(g('r_pop').value)
    } });
    setTimeout(pedir, 300);
}

const ESTADOS = { playing: ['EN JUEGO', 'st-playing', 's-playing'], waiting: ['LOBBY', 'st-waiting', 's-waiting'], ended: ['TERMINADA', 'st-ended', 's-ended'], offline: ['OFFLINE', 'st-offline', ''] };

function cartaSala(r) {
    const [stTxt, stCls, cardCls] = ESTADOS[r.state] || ESTADOS.offline;
    const id = r.key;
    let timer = '';
    if (r.state === 'playing' && r.tlMs != null) timer = `<div class="timerline">${IC.clock} Quedan ${fmtMs(r.tlMs)} de partida</div>`;
    if (r.state === 'ended' && r.restartEnMs != null) timer = `<div class="timerline naranja">${IC.refresh} La sala se reinicia en ${Math.ceil(r.restartEnMs/1000)} s</div>`;
    if (r.state === 'waiting') timer = `<div class="timerline amarillo">${IC.users} En el lobby: ${r.conectados} de ${r.needed} necesarios</div>`;

    let jugadores = '';
    if (expandidos.has(id) && r.players.length > 0) {
        jugadores = `<div class="players-wrap"><table class="players"><thead><tr><th>Jugador</th><th>IP</th><th>Masa</th><th>Kills</th><th>Estado</th><th>Tiempo</th><th></th></tr></thead><tbody>` +
            r.players.map(p => `<tr>
                <td><b>${esc(p.name) || '(sin nombre)'}</b></td><td>${esc(p.ip)}</td><td>${num(p.mass)}</td><td>${p.kills}</td>
                <td>${p.god ? '<span class="tag god">GOD</span> ' : ''}${p.alive ? '<span class="tag vivo">VIVO</span>' : '<span class="tag muerto">ESPECT.</span>'}</td>
                <td>${fmtSeg(p.conectadoSec)}</td>
                <td style="white-space:nowrap; text-align:right">
                    <button class="b morado mini" onclick="god('${esc(p.id)}')">${p.god ? 'Quitar God' : 'Dar God'}</button>
                    <button class="b azul mini" onclick="masa('${esc(p.id)}')">Masa</button>
                    <button class="b rojo mini" onclick="kick('${esc(p.id)}')">Echar</button>
                </td>
            </tr>`).join('') + '</tbody></table></div>';
    } else if (expandidos.has(id)) {
        jugadores = '<div class="vacio" style="padding:12px">Nadie conectado en esta sala.</div>';
    }

    const rl = r.rules;
    return `<div class="room ${cardCls}" id="card_${id}">
        <div class="room-head">
            <div class="room-name russo">${esc(r.roomName)}<span class="meta">${r.mode.toUpperCase()} · ${r.price ? 'ENTRADA ' + r.price + '$' : 'GRATIS'}</span></div>
            <span class="state ${stCls}"><span class="d"></span>${stTxt}</span>
        </div>
        <div class="room-body">
            <div class="statline">
                <span class="players-chip" onclick="togglePlayers('${id}')"><span class="pdot ${r.conectados > 0 ? 'on' : ''}"></span>${r.conectados} JUGADOR${r.conectados === 1 ? '' : 'ES'} <span style="color:#555">${expandidos.has(id) ? '▴' : '▾'}</span></span>
                <span class="it">${IC.bot} ${r.bots} bots</span>
                <span class="it">${IC.in} ${num(r.stats.entradas)} entradas</span>
                <span class="it">${IC.skull} ${num(r.stats.muertes)}</span>
                <span class="it">${IC.coin} ${dinero(r.stats.dinero)}</span>
            </div>
            ${timer}
            ${jugadores}
            <div class="rules">
                <div><label>Velocidad</label><input type="number" step="0.25" min="0.25" max="5" id="r_speed_${id}" value="${rl.speed}"></div>
                <div><label>Comida ×</label><input type="number" step="0.25" min="0.25" max="10" id="r_food_${id}" value="${rl.food}"></div>
                <div><label>Virus ×</label><input type="number" step="0.5" min="0" max="10" id="r_virus_${id}" value="${rl.virus}"></div>
                <div><label>Bots</label><input type="number" step="1" min="0" max="200" id="r_botn_${id}" value="${rl.botCount}"></div>
                <div><label>Mín. reales</label><input type="number" step="1" min="1" max="50" id="r_minreal_${id}" value="${rl.minReal != null ? rl.minReal : 5}"></div>
                <div><label>Población</label><input type="number" step="1" min="0" max="60" id="r_pop_${id}" value="${rl.targetPop != null ? rl.targetPop : 10}"></div>
            </div>
            <div class="ruleline">
                <label class="chk"><input type="checkbox" id="r_botson_${id}" ${rl.botsEnabled ? 'checked' : ''}> bots activados</label>
                <button class="b verde mini" onclick="aplicarReglas('${id}')">Aplicar</button>
                <span class="hint">población = reales + bots de relleno (0 = sin relleno) · velocidad, comida y población al instante</span>
            </div>
            <div class="btns">
                <button class="b verde" onclick="forzar('${id}')" ${r.state !== 'waiting' ? 'disabled' : ''}>${IC.play} Forzar inicio</button>
                <button class="b azul" onclick="espectar('${r.mode}','${esc(r.roomName)}')" ${r.state !== 'playing' ? 'disabled' : ''}>${IC.users} Espectar</button>
                <button class="b naranja" onclick="reiniciar('${id}')" ${r.state === 'offline' ? 'disabled' : ''}>${IC.refresh} Reiniciar</button>
                <button class="b" onclick="vaciar('${id}')" ${r.conectados === 0 ? 'disabled' : ''}>${IC.broom} Echar a todos</button>
                <button class="b rojo" onclick="apagar('${id}')" ${r.state === 'offline' ? 'disabled' : ''}>${IC.power} Apagar</button>
            </div>
        </div>
    </div>`;
}

function render(m) {
    document.getElementById('liveTxt').innerText = 'en vivo';
    document.getElementById('metaInfo').innerText = `mínimo por sala: ${m.minPlayers} jugadores`;
    document.getElementById('summary').innerHTML = `
        <div class="sumcard">${IC.room}<div><div class="v russo">${m.totales.salasOnline}</div><div class="k">salas con gente</div></div></div>
        <div class="sumcard">${IC.users}<div><div class="v russo">${m.totales.jugadores}</div><div class="k">conectados ahora</div></div></div>
        <div class="sumcard">${IC.door}<div><div class="v russo">${num(m.totales.jugadoresUnicos)}</div><div class="k">jugadores distintos</div></div></div>
        <div class="sumcard">${IC.in}<div><div class="v russo">${num(m.totales.entradas)}</div><div class="k">entradas totales</div></div></div>
        <div class="sumcard">${IC.skull}<div><div class="v russo">${num(m.totales.muertes)}</div><div class="k">muertes totales</div></div></div>
        <div class="sumcard">${IC.coin}<div><div class="v russo">${dinero(m.totales.dinero)}</div><div class="k">dinero generado</div></div></div>`;

    const porSeccion = { classic: [], arcade: [], otras: [] };
    for (const r of m.rooms) {
        if (r.mode === 'classic') porSeccion.classic.push(r);
        else if (r.mode === 'arcade') porSeccion.arcade.push(r);
        else porSeccion.otras.push(r);
    }
    pintarGrid('gridClassic', porSeccion.classic);
    pintarGrid('gridArcade', porSeccion.arcade);
    ponCnt('cntClassic', porSeccion.classic.reduce((s, r) => s + r.conectados, 0));
    ponCnt('cntArcade', porSeccion.arcade.reduce((s, r) => s + r.conectados, 0));
    document.getElementById('gridOtras').innerHTML = porSeccion.otras.length
        ? '<h2 class="section">Otras salas</h2><div class="grid">' + porSeccion.otras.map(cartaSala).join('') + '</div>' : '';

    let rank = '';
    (m.ranking || []).forEach((p, i) => {
        const kd = p.muertes > 0 ? (p.kills / p.muertes).toFixed(2) : p.kills.toFixed(0) + '.00';
        rank += `<tr>
            <td><span class="pos ${i === 0 ? 'p1' : i === 1 ? 'p2' : i === 2 ? 'p3' : ''} russo">${i + 1}</span></td>
            <td><b style="color:#fff">${esc(p.name)}</b></td><td class="kills">${num(p.kills)}</td><td>${num(p.muertes)}</td><td>${kd}</td>
            <td>${num(p.partidas)}</td><td>${fecha(p.lastSeen)}</td><td style="color:#666">${esc(p.lastIp || '—')}</td>
        </tr>`;
    });
    document.getElementById('rankCuerpo').innerHTML = rank || '<tr><td colspan="8" class="vacio">Aún no hay jugadores con nombre registrados.</td></tr>';

    let pais = '';
    (m.paises || []).forEach((p, i) => {
        pais += `<tr>
            <td><span class="pos ${i === 0 ? 'p1' : i === 1 ? 'p2' : i === 2 ? 'p3' : ''} russo">${i + 1}</span></td>
            <td><b style="color:#fff">${esc(p.name)}</b></td>
            <td><span class="ccode">${esc(p.code)}</span></td>
            <td>${num(p.entradas)}</td>
            <td class="kills">${dinero(p.dinero)}</td>
        </tr>`;
    });
    document.getElementById('paisesCuerpo').innerHTML = pais || '<tr><td colspan="5" class="vacio">Sin conexiones registradas.</td></tr>';

    const usadas = m.rooms.filter(r => r.stats.entradas > 0).sort((a, b) => b.stats.entradas - a.stats.entradas).slice(0, 10);
    const maxE = usadas.length ? usadas[0].stats.entradas : 1;
    document.getElementById('usoSalas').innerHTML = usadas.length ? usadas.map(r => `
        <div class="urow">
            <span class="nm russo">${esc(r.roomName)} <span>${r.mode.toUpperCase()}</span></span>
            <div class="ubar"><i style="width:${Math.max(4, Math.round(r.stats.entradas / maxE * 100))}%"></i></div>
            <span class="val">${num(r.stats.entradas)} entradas · ${dinero(r.stats.dinero)}</span>
        </div>`).join('') : '<div class="vacio">Sin actividad todavía.</div>';

    let hist = '';
    for (const h of m.historial) hist += `<tr><td>${fecha(h.fecha)}</td><td><b style="color:#ccc">${esc(h.nombre)}</b></td><td>${esc(h.ip)}</td><td>${esc(h.sala)}</td></tr>`;
    document.getElementById('histCuerpo').innerHTML = hist || '<tr><td class="vacio">Sin conexiones registradas.</td></tr>';
}

function pintarGrid(elId, salas) {
    const cont = document.getElementById(elId);
    const activa = document.activeElement && document.activeElement.closest ? document.activeElement.closest('.room') : null;
    if (activa && cont.contains(activa)) return;
    if (cont.matches(':hover')) return;   // no redibujar mientras el ratón está encima

    // Guardar scroll horizontal de cada tabla de jugadores
    const hScrolls = {};
    cont.querySelectorAll('[id^="card_"]').forEach(card => {
        const w = card.querySelector('.players-wrap');
        if (w && w.scrollLeft > 0) hScrolls[card.id] = w.scrollLeft;
    });

    const sy = window.scrollY;
    cont.innerHTML = salas.map(cartaSala).join('');
    window.scrollTo({ top: sy, behavior: 'instant' });

    // Restaurar scroll horizontal
    for (const [id, sl] of Object.entries(hScrolls)) {
        const card = document.getElementById(id);
        if (card) { const w = card.querySelector('.players-wrap'); if (w) w.scrollLeft = sl; }
    }
}
</script>
</body>
</html>
